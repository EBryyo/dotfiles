[general]
import = ["~/.config/alacritty/themes/noctalia.toml"]

# ----------------------------
# Alacritty Configuration
# ----------------------------

# Set your shell (zsh)
[terminal.shell]
program = "/bin/zsh"

# Window settings
[window]
padding = { x = 10, y = 10 }
decorations = "None"
startup_mode = "Maximized"
dynamic_title = true
opacity = 0.95

# Scrolling
[scrolling]
history = 10000
multiplier = 3

# Font configuration
[font]
size = 8.0

[font.normal]
family = "JetBrains Mono"
style = "Regular"

[font.bold]
family = "JetBrains Mono"
style = "Bold"

[font.italic]
family = "JetBrains Mono"
style = "Italic"

# Cursor
[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 500

# Mouse
[mouse]
hide_when_typing = true


# ----------------------------
# Nord Color Scheme
# ----------------------------

[colors.primary]

# Normal colors
[colors.normal]
black   = "#3B4252" # nord1
red     = "#BF616A" # nord11
green   = "#A3BE8C" # nord14
yellow  = "#EBCB8B" # nord13
blue    = "#81A1C1" # nord9
magenta = "#B48EAD" # nord15
cyan    = "#88C0D0" # nord8
white   = "#E5E9F0" # nord5

# Bright colors
[colors.bright]
black   = "#4C566A" # nord3
red     = "#BF616A"
green   = "#A3BE8C"
yellow  = "#EBCB8B"
blue    = "#81A1C1"
magenta = "#B48EAD"
cyan    = "#8FBCBB" # nord7
white   = "#ECEFF4" # nord6

# Cursor colors
[colors.cursor]
text   = "#2E3440"
cursor = "#D8DEE9"

# Selection colors
[colors.selection]
text       = "#2E3440"
background = "#88C0D0"


# ----------------------------
# Key bindings
# ----------------------------

[[keyboard.bindings]]
key = "V"
mods = "Control|Shift"
action = "Paste"

[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key = "N"
mods = "Control|Shift"
action = "SpawnNewInstance"

[terminal]

